<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #f0f2f5; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }
  .card {
    width: 720px; min-height: 900px; border-radius: 24px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 56px 48px; position: relative; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .card::before {
    content: ''; position: absolute; top: -50%; right: -30%;
    width: 500px; height: 500px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .tag {
    display: inline-block; background: rgba(255,255,255,0.15);
    border-radius: 40px; padding: 6px 20px;
    color: rgba(255,255,255,0.9); font-size: 14px; margin-bottom: 24px;
  }
  h1 { font-size: 52px; font-weight: 900; color: white; line-height: 1.25; }
  .sub { font-size: 18px; color: rgba(255,255,255,0.75); margin-top: 12px; line-height: 1.6; }
  .divider { width: 60px; height: 4px; background: rgba(255,255,255,0.3); margin: 28px 0; border-radius: 2px; }
  .items { display: flex; flex-direction: column; gap: 16px; margin-top: 8px; }
  .item { display: flex; align-items: flex-start; gap: 16px; }
  .num {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.2); 
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 16px; font-weight: 700; flex-shrink: 0;
    margin-top: 2px;
  }
  .item-text h3 { font-size: 18px; font-weight: 600; color: white; margin-bottom: 4px; }
  .item-text p { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.5; }
  .footer { margin-top: 32px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.15); }
  .footer p { color: rgba(255,255,255,0.6); font-size: 13px; line-height: 1.6; }
</style>
</head>
<body>
<div class="card">
  <div class="tag">📊 实操干货</div>
  <h1>TK小店<br>选品4个硬指标</h1>
  <div class="sub">做了8年TK投放，总结出这套筛选逻辑</div>
  <div class="divider"></div>
  <div class="items">
    <div class="item">
      <div class="num">1</div>
      <div class="item-text"><h3>毛利率 ≥ 40%</h3><p>客单价低于$15的品，运费+佣金+投流一算白干。进货+运费控制在售价60%以内才有空间。</p></div>
    </div>
    <div class="item">
      <div class="num">2</div>
      <div class="item-text"><h3>完播率 > 25%</h3><p>上架前先搜这个品的关键词。达人视频前3秒就划走？说明这个品天生没视觉钩子。</p></div>
    </div>
    <div class="item">
      <div class="num">3</div>
      <div class="item-text"><h3>评论区翻需求</h3><p>翻竞品链接前20条差评。"质量不错就是太大了"——这就是你的改良方向。</p></div>
    </div>
    <div class="item">
      <div class="num">4</div>
      <div class="item-text"><h3>复购定打法</h3><p>消耗品可以ROI往低打，先亏后赚。一次性买卖必须一次赚够利润。</p></div>
    </div>
  </div>
  <div class="footer">
    <p>📌 每天30分钟：看热搜榜15min · 翻评论区10min · 过指标5min<br>不比谁铺得多，比谁选得准</p>
  </div>
</div>
</body>
</html>
